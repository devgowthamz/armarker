<!DOCTYPE html>
<html>
<head>
  <title>AR Box with Webcam</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body>

    <a-scene embedded arjs="sourceType: webcam; facingMode: user; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="spi.patt">
        <!-- <a-box color="red" material="opacity: 0.5" scale="0.5 0.5 0.5"></a-box> -->
         <!-- <a-glTF-model src="spidy.glb" scale="0.5 0.5 0.5" position="0 0 0"></a-glTF-model> -->
          <a-glTF-model 
              src="spidy.glb"
              scale="0.5 0.5 0.5"
              position="0 0 0"
              rotation="0 0 0">
            </a-glTF-model>
      </a-marker>

      <a-entity camera>
        <a-cursor></a-cursor>
      </a-entity>

    </a-scene>

</body>
</html>
